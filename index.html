<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NBA Parlay Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>NBA Parlay Builder</h1>
    <p>Smart Rule-Based Selection Engine</p>
</header>

<main>

<section class="controls">
    <h2>Select Game</h2>
    <select id="teamSelect">
        <option value="">-- Choose Team --</option>
        <option value="LAL">Los Angeles Lakers</option>
        <option value="BOS">Boston Celtics</option>
        <option value="DEN">Denver Nuggets</option>
        <option value="MIL">Milwaukee Bucks</option>
    </select>

    <select id="marketSelect">
        <option value="">-- Choose Market --</option>
        <option value="spread">Spread</option>
        <option value="moneyline">Moneyline</option>
        <option value="over">Game Over</option>
        <option value="under">Game Under</option>
    </select>

    <input type="number" id="oddsInput" placeholder="Enter Odds (e.g. -110)">

    <button id="addBet">Add to Parlay</button>
</section>

<section class="parlay">
    <h2>Your Parlay</h2>
    <ul id="parlayList"></ul>
    <div class="summary">
        <p>Total Legs: <span id="totalLegs">0</span></p>
        <p>Combined Odds: <span id="combinedOdds">0</span></p>
        <p>Potential Payout ($100): <span id="payout">$0</span></p>
    </div>
</section>

<section class="validation">
    <h2>Rule Engine Status</h2>
    <div id="ruleStatus">Waiting for selections...</div>
</section>

</main>

<footer>
    <p>NBA Parlay Simulation Tool | For Educational Purposes Only</p>
</footer>

<script src="script.js"></script>
</body>
</html>
